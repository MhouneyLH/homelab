global:
  addPrometheusAnnotations: true

server:
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443
  extraArgs:
    - --insecure
  # using node selector to make sure that argocd is running on control plane node
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  metrics:
    enabled: true

controller:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  metrics:
    enabled: true

repoServer:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  metrics:
    enabled: true

applicationSet:
  metrics:
    enabled: true

dex:
  metrics:
    enabled: true

notifications:
  metrics:
    enabled: true

configs:
  params:
    server.insecure: true
  cm:
    timeout.reconciliation: 15s
