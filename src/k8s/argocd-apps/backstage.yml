---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://backstage.github.io/charts
      chart: backstage
      targetRevision: "2.6.3"
      helm:
        releaseName: backstage
        valueFiles:
          - $values/src/k8s/apps/platform/backstage/values.yml

    - repoURL: https://github.com/MhouneyLH/homelab.git
      targetRevision: master
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
