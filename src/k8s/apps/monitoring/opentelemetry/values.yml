---
# Simple OpenTelemetry Collector configuration
mode: deployment
replicaCount: 1

# Run on worker node
nodeSelector:
  kubernetes.io/hostname: hl-worker-01

# Resource limits for homelab
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Service configuration
service:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: metrics
      port: 8889
      targetPort: 8889
      protocol: TCP

# OpenTelemetry Collector configuration
config:
  receivers:
    # Receive OTLP traces and metrics
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # Scrape Kubernetes kubelet metrics
    kubeletstats:
      collection_interval: 30s
      auth_type: "serviceAccount"
      endpoint: "https://${env:K8S_NODE_IP}:10250"
      insecure_skip_verify: true

    # Scrape Node Exporter metrics (centralized collection)
    prometheus/node-exporter:
      config:
        scrape_configs:
          - job_name: 'node-exporter'
            static_configs:
              - targets: ['prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100']
            scrape_interval: 30s

          - job_name: 'kube-state-metrics'
            static_configs:
              - targets: ['prometheus-kube-state-metrics.monitoring.svc.cluster.local:8080']
            scrape_interval: 30s

  processors:
    # Simple batch processing
    batch:
      timeout: 5s
      send_batch_size: 512

  exporters:
    # Export metrics in Prometheus format
    prometheus:
      endpoint: "0.0.0.0:8889"
      namespace: "otelc"

    # Log traces and metrics for debugging
    logging:
      loglevel: info

  service:
    pipelines:
      # Metrics pipeline - OTelC as central collection hub
      metrics:
        receivers: [otlp, kubeletstats, prometheus/node-exporter]
        processors: [batch]
        exporters: [prometheus, logging]

      # Traces pipeline
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [logging]

      # Logs pipeline
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [logging]

# No need for ServiceMonitor - Prometheus scrapes directly
serviceMonitor:
  enabled: false
