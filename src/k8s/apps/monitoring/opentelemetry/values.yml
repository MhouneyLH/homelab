---
# Simple OpenTelemetry Collector configuration
mode: deployment
replicaCount: 1

# Required: Set the collector image
image:
  repository: otel/opentelemetry-collector-contrib
  tag: ""  # Use chart's default version

# Run on worker node
nodeSelector:
  kubernetes.io/hostname: hl-worker-01

# Resource limits for homelab
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Service configuration
service:
  type: ClusterIP

# Enable ClusterRole for kubelet access
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get"]
    - nonResourceURLs: ["/metrics"]
      verbs: ["get"]

# Enable metrics port for Prometheus scraping (port 8889)
ports:
  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

# Minimal OpenTelemetry Collector configuration
config:
  extensions:
    # Mandatory health check extension
    health_check:
      endpoint: ${env:MY_POD_IP}:13133

  receivers:
    # Basic OTLP receiver for future use
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318

    # Scrape Node Exporter metrics (centralized collection)
    prometheus/node-exporter:
      config:
        scrape_configs:
          - job_name: 'node-exporter'
            static_configs:
              - targets: ['prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100']
            scrape_interval: 30s

    # Scrape kube-state-metrics
    prometheus/kube-state-metrics:
      config:
        scrape_configs:
          - job_name: 'kube-state-metrics'
            static_configs:
              - targets: ['prometheus-kube-state-metrics.monitoring.svc.cluster.local:8080']
            scrape_interval: 30s

    # Collect kubelet metrics directly
    kubeletstats:
      collection_interval: 30s
      auth_type: "serviceAccount"
      endpoint: "https://${env:K8S_NODE_IP}:10250"
      insecure_skip_verify: true

  processors:
    # Mandatory memory limiter
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

    # Basic batch processing
    batch: {}

  exporters:
    # Export metrics for Prometheus scraping on port 8889
    prometheus:
      endpoint: "${env:MY_POD_IP}:8889"

  service:
    extensions: [health_check]

    pipelines:
      # Centralized metrics pipeline - OTelC as collection hub
      metrics:
        receivers: [otlp, prometheus/node-exporter, prometheus/kube-state-metrics, kubeletstats]
        processors: [memory_limiter, batch]
        exporters: [prometheus]

# No need for ServiceMonitor - Prometheus scrapes directly
serviceMonitor:
  enabled: false
