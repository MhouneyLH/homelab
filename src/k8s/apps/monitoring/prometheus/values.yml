---
# Disable Grafana since we already have it running
grafana:
  enabled: false

# Ensure CRD installation is handled properly
crds:
  enabled: true

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Run on worker node
    nodeSelector:
      kubernetes.io/hostname: hl-worker-01

    # Persistence for metrics data
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Resource limits for homelab
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi

    # Retention period
    retention: "30d"
    retentionSize: "9GB"

    # Disable features that require problematic CRDs
    enableRemoteWriteReceiver: false

    # Simple rule selector (avoid complex CRD dependencies)
    ruleSelector: {}
    ruleNamespaceSelector: {}

    # Simple service monitor selector
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # Disable scrape configs CRD (this is causing one of the errors)
    scrapeConfigSelector: {}
    scrapeConfigNamespaceSelector: {}

  # Expose Prometheus via NodePort
  service:
    type: NodePort
    nodePort: 30090  # Access Prometheus at :30090

# Node Exporter configuration
nodeExporter:
  enabled: true

# Kube State Metrics
kubeStateMetrics:
  enabled: true

# Alertmanager
alertmanager:
  enabled: false  # Disable for homelab simplicity

# Prometheus Operator
prometheusOperator:
  nodeSelector:
    kubernetes.io/hostname: hl-worker-01

  # Manage CRDs properly
  manageCrds: true
  createCustomResource: true

  # Disable admission webhooks to avoid issues
  admissionWebhooks:
    enabled: false

  # Resource limits
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Disable components we don't need that might cause CRD issues
prometheusConfigReloader:
  resources:
    requests:
      cpu: 50m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 100Mi

# Disable rules controller since we're not using complex alerting
ruleSelector: {}