---
# Disable Grafana since we already have it running
grafana:
  enabled: false

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Run on worker node
    nodeSelector:
      kubernetes.io/hostname: hl-worker-01

    # Persistence for metrics data
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Resource limits for homelab
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi

    # Retention period
    retention: "30d"
    retentionSize: "9GB"

  # Expose Prometheus via NodePort
  service:
    type: NodePort
    nodePort: 30090  # Access Prometheus at :30090

# Node Exporter configuration
nodeExporter:
  enabled: true

# Kube State Metrics
kubeStateMetrics:
  enabled: true

# Alertmanager
alertmanager:
  enabled: false  # Disable for homelab simplicity

# Prometheus Operator
prometheusOperator:
  nodeSelector:
    kubernetes.io/hostname: hl-worker-01