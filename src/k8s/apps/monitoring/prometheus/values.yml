---
# Expose Prometheus via NodePort
server:
  service:
    type: NodePort
    nodePort: 30090

  # Persistence
  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 10Gi

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Retention; delete the oldest data when hitting
  # either the time or size limit; whatever comes first
  retention: "30d"
  retentionSize: "8GB"

  # Node selector - run on worker node
  nodeSelector:
    kubernetes.io/hostname: hl-worker-01

  # Override global prometheus settings
  global:
    scrape_interval: 30s
    evaluation_interval: 30s

# Enable basic components but let OTelC handle collection
prometheus-node-exporter:
  enabled: true # Still deploy node-exporter, but OTelC will scrape it

pushgateway:
  enabled: false

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: true # Deploy but let OTelC scrape it

# Disable all default scrape configs - we'll configure our own
scrapeConfigs:
  prometheus:
    enabled: true # Keep self-monitoring
  kubernetes-api-servers:
    enabled: true # Keep API server monitoring
  kubernetes-nodes:
    enabled: false # Disable - OTelC handles this
  kubernetes-nodes-cadvisor:
    enabled: false # Disable - OTelC handles this
  kubernetes-service-endpoints:
    enabled: false # Disable - use annotations instead
  kubernetes-service-endpoints-slow:
    enabled: false
  prometheus-pushgateway:
    enabled: false # Disabled pushgateway
  kubernetes-services:
    enabled: false # Disable blackbox probing
  kubernetes-pods:
    enabled: true # Keep for annotated pods
  kubernetes-pods-slow:
    enabled: false

# Add our custom scrape config for OpenTelemetry Collector
extraScrapeConfigs: |
  # PRIMARY: Scrape OpenTelemetry Collector (centralized metrics)
  - job_name: 'opentelemetry-collector'
    static_configs:
      - targets: ['otelc-opentelemetry-collector.monitoring.svc.cluster.local:8889']
    scrape_interval: 10s

# Set empty rule files
ruleFiles: {}

serverFiles:
  # Empty rule files
  recording_rules.yml: {}
  alerting_rules.yml: {}
  rules: {}
  alerts: {}