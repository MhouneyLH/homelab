---
# Run on worker node
nodeSelector:
  kubernetes.io/hostname: hl-worker-01

# Expose Prometheus via NodePort
server:
  service:
    type: NodePort
    nodePort: 30090

  # Persistence
  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 10Gi

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Retention; delete the oldest data when hitting
  # either the time or size limit; whatever comes first
  retention: "30d"
  retentionSize: "8GB"

  # Node selector
  nodeSelector:
    kubernetes.io/hostname: hl-worker-01

# Enable basic components but let OTelC handle collection
prometheus-node-exporter:
  enabled: true # Still deploy node-exporter, but OTelC will scrape it

pushgateway:
  enabled: false

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: true # Deploy but let OTelC scrape it

# Disable all default scrape configs to prevent merging conflicts
extraScrapeConfigs: ""

# Completely disable default rule files
ruleFiles: {}

# Disable default scrape configs
configmapReload:
  enabled: true

# Use secret mounted config instead of configmap to avoid chart merging
# This forces a complete override rather than merge
configMapOverrideName: ""

# Completely override the default prometheus.yml configuration
serverFiles:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    rule_files: []

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # PRIMARY: Scrape OpenTelemetry Collector (centralized metrics)
      - job_name: "opentelemetry-collector"
        static_configs:
          - targets: ["otelc-opentelemetry-collector.monitoring.svc.cluster.local:8889"]
        scrape_interval: 10s

      # Basic Kubernetes API server (direct scrape)
      - job_name: "kubernetes-apiservers"
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels:
              [
                __meta_kubernetes_namespace,
                __meta_kubernetes_service_name,
                __meta_kubernetes_endpoint_port_name,
              ]
            action: keep
            regex: default;kubernetes;https

      # Optional: Scrape pods with prometheus annotations (for apps that expose metrics directly)
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

  # Ensure completely empty rule files
  recording_rules.yml: {}
  alerting_rules.yml: {}
  rules: {}
  alerts: {}
