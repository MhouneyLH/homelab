---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hivemq-broker
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://hivemq.github.io/helm-charts
      chart: hivemq-platform
      targetRevision: "0.2.64"
      helm:
        releaseName: hivemq-platform
        valueFiles:
          - $values/src/k8s/apps/services/hivemq-broker/values.yml

    - repoURL: https://github.com/MhouneyLH/homelab.git
      targetRevision: master
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: services

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
