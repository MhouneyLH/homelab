#       if [ ! -d "Family Tree" ] && [ -f /import-data/family-tree.gramps ]; then
#         python -m grampsweb.import /import-data/family-tree.gramps
#       fi
#   volumeMounts:
#     - name: import-data
#       mountPath: /import-data
#       readOnly: true
#     - name: grampsweb
#       mountPath: /root/.local/share/gramps

# Volumes for ConfigMap-based imports
volumes: []
# - name: import-data
#   configMap:
#     name: gramps-import-data
#     defaultMode: 0644

volumeMounts: []
