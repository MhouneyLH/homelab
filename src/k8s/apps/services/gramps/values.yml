---
# Gramps Web Configuration

# Replicas and node selector
replicaCount: 1
nodeSelector:
  kubernetes.io/hostname: hl-worker-01

# Image configuration
image:
  registry: ghcr.io
  repository: gramps-project/grampsweb
  tag: "" # Will use chart default

# Storage - Volumes & Persistence
persistence:
  enabled: true
  storageClass: local-path
  accessMode: ReadWriteOnce
  size: 10Gi # Adjust based on your family tree size

# Service configuration
service:
  type: ClusterIP  # Changed from NodePort (ingress will handle external access)
  port: 5000

# Ingress configuration - for external access via Traefik
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - host: gramps.lucas-homelab-festung-der-finsternis.duckdns.org
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # Optional TLS configuration:
  # tls:
  #   - secretName: gramps-tls
  #     hosts:
  #       - gramps.homelab.local

# Gramps-specific configuration
gramps:
  # Base URL for generating links in emails (password reset, etc.)
  baseURL: http://gramps.lucas-homelab-festung-der-finsternis.duckdns.org

  # Tree configuration - single tree is default
  # For multi-tree support, set to: "*"
  tree: "Family Tree"

  # Security settings
  registrationDisabled: true # Disable public registration
  disableTelemetry: true # No telemetry

  # Media file organization
  mediaPrefixTree: false # Set to true if using multiple trees

  # Email configuration (optional - for password reset emails)
  # Uncomment and configure if you have an SMTP server:
  # mail:
  #   host: smtp.example.com
  #   port: 587
  #   username: your-email@example.com
  #   password: your-app-password
  #   from: noreply@homelab.local
  #   useTLS: true

# Resource requests and limits (adjust as needed)
resources: {}
#  limits:
#    cpu: 500m
#    memory: 512Mi
#  requests:
#    cpu: 100m
#    memory: 128Mi

# Security context (optional, adjust as needed)
podSecurityContext: {}
securityContext: {}

