---
replicaCount: 1
nodeSelector:
  kubernetes.io/hostname: hl-worker-01

image:
  registry: ghcr.io
  repository: gramps-project/grampsweb
  tag: "" # chart default

persistence:
  enabled: true
  storageClass: local-path
  accessMode: ReadWriteOnce
  size: 10Gi

service:
  type: ClusterIP
  port: 5000

# external access via traefik ingress
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-issuer
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: gramps.lucas-homelab-festung-der-finsternis.duckdns.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gramps-tls
      hosts:
        - gramps.lucas-homelab-festung-der-finsternis.duckdns.org

# gramps specific configuration
gramps:
  # Base URL for generating links in emails (password reset, etc.)
  baseURL: https://gramps.lucas-homelab-festung-der-finsternis.duckdns.org
  tree: "Hünniger Familienbaum"
  registrationDisabled: false
  disableTelemetry: true
  mediaPrefixTree: false

resources: {}

podSecurityContext: {}
securityContext: {}

# Init containers for automatic data import on first start
# SETUP:
# 1. Export your data:
#    kubectl cp grampsweb-pod:/root/.local/share/gramps ~/gramps-backup
#    Or via API: curl http://localhost:5000/api/export > family-tree.json
#
# 2. Create ConfigMap:
#    kubectl create configmap gramps-import-data --from-file=family-tree.gramps -n services
#
# 3. Uncomment initContainers below and values.volumes/volumeMounts above
#
initContainers: []
# - name: import-data
#   image: ghcr.io/gramps-project/grampsweb:latest
#   command:
#     - /bin/sh
#     - -c
#     - |
#       cd /root/.local/share/gramps
#       # Import GRAMPS database if not already present
#       if [ ! -d "Family Tree" ] && [ -f /import-data/family-tree.gramps ]; then
#         python -m grampsweb.import /import-data/family-tree.gramps
#       fi
#   volumeMounts:
#     - name: import-data
#       mountPath: /import-data
#       readOnly: true
#     - name: grampsweb
#       mountPath: /root/.local/share/gramps

volumes: []

volumeMounts: []
