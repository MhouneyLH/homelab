---
# Node selector - run on control plane
nodeSelector:
  node-role.kubernetes.io/control-plane: ""

tolerations:
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

service:
  enabled: true
  single: true
  spec:
    type: NodePort

# entrypoints (listeners)
ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
    nodePort: 30081
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    nodePort: 30444

# dashboard
api:
  dashboard: true
  insecure: true

# k8s traefik provider as ingress controller
providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
      namespace: traefik

logs:
  general:
    level: INFO

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
