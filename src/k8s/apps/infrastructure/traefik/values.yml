---
# Traefik Configuration

# Node selector - run on control plane
nodeSelector:
  node-role.kubernetes.io/control-plane: hl-control-plane

tolerations:
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

# Traefik service configuration
service:
  enabled: true
  single: true
  spec:
    type: NodePort

# Traefik entrypoints (listeners)
ports:
  web:
    port: 15000
    expose:
      default: true
    exposedPort: 15000
    protocol: TCP
    nodePort: 30015
  websecure:
    port: 15001
    expose:
      default: true
    exposedPort: 15001
    protocol: TCP
    nodePort: 31501

# API/Dashboard configuration
api:
  dashboard: true
  insecure: true

# Enable Kubernetes provider for ingress
providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
      namespace: traefik

# Logging
logs:
  general:
    level: INFO

# Metrics (optional)
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
