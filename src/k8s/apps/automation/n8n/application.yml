---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://community-charts.github.io/helm-charts
      chart: n8n
      targetRevision: "1.16.31"
      helm:
        releaseName: n8n
        valueFiles:
          - $values/src/k8s/apps/automation/n8n/values.yml

    - repoURL: https://github.com/MhouneyLH/homelab.git
      targetRevision: master
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: automation

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
