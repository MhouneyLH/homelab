---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # clean up child apps on deletion
spec:
  project: default

  source:
    repoURL: https://github.com/MhouneyLH/homelab.git
    targetRevision: master
    path: src/k8s/argocd-apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true # delete resources when removed from Git
      selfHeal: true # auto-sync when cluster state drifts
    syncOptions:
      - CreateNamespace=true # auto-create namespace if it doesn't exist
